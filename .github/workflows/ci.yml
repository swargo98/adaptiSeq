name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Live network tests skip themselves when ADAPTISEQ_NO_NETWORK=1; the offline
# fixture/local-server suite is what gates CI.
env:
  ADAPTISEQ_NO_NETWORK: "1"

jobs:
  test:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package + test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[test]'
      - name: Run offline test suite
        run: python -m pytest -q
      - name: Run sysbench unit tests
        run: python -m pytest sysbench/tests -q

  build:
    name: build + twine check + wheel smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
      - name: Validate distribution metadata
        run: python -m twine check dist/*
      - name: Smoke-test the built wheel in a clean venv
        run: |
          python -m venv /tmp/smoke
          /tmp/smoke/bin/pip install dist/*.whl
          cd /tmp   # run outside the source tree so the installed package is used
          /tmp/smoke/bin/adaptiseq --version
          /tmp/smoke/bin/python -m adaptiseq --version
          /tmp/smoke/bin/python -c "import adaptiseq; print('import OK', adaptiseq.__version__)"
      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*
