name: Docs

# Build the MkDocs (Material) site and publish it to GitHub Pages.
on:
  push:
    branches: [main]
    paths:
      - docs/**
      - mkdocs.yml
      - .github/workflows/docs.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Cache pip
        uses: actions/cache@v4
        with:
          key: mkdocs-material-${{ hashFiles('.github/workflows/docs.yml') }}
          path: ~/.cache/pip
      - run: pip install "mkdocs-material>=9.5"
      - name: Build and deploy to gh-pages
        run: mkdocs gh-deploy --force --strict
