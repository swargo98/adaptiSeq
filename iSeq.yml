# Conda environment for adaptiSeq.
#
# Same external tools iseq requires (wget, axel, pigz, aspera-cli, sra-tools)
# plus the light Python additions adaptiSeq needs: aiohttp + aioftp (segmented
# HTTP(S)/FTP engine) and numpy (the gradient adaptive controller). Metadata
# bytes are pulled by `wget` (shelled out, exactly as iseq does), so `requests`
# is NOT required. openpyxl is optional (GSA XLSX parsing in the library API).
name: adaptiseq
channels:
  - conda-forge
  - bioconda
dependencies:
  # external download/convert tools (unchanged from iseq)
  - pigz
  - wget
  - axel
  - aspera-cli ==4.14.0
  - sra-tools >=2.11.0
  # light Python additions for Parts 1-2
  - python >=3.8
  - pip
  - aiohttp >=3.8    # Part 2: segmented HTTP(S) engine
  - aioftp >=0.21    # Part 2: native segmented FTP transport
  - numpy >=1.21     # Part 3: gradient adaptive controller
  - openpyxl >=3.0   # optional: parse GSA XLSX in the library API
  - psutil >=5.9     # sysbench sampler + tests
  - pytest >=7.0     # test suite
  - pip:
      - -e .
