# Conda environment for adaptiSeq (Part 1).
#
# Same external tools iseq requires (wget, axel, pigz, aspera-cli, sra-tools)
# plus only the light Python additions Part 1 needs. Metadata bytes are pulled by
# `wget` (shelled out, exactly as iseq does), so `requests` is NOT required.
#
# Deliberately NOT added in Part 1: aiohttp, aioftp, numpy, skopt, scipy
# (those belong to Parts 2 and 3).
name: adaptiseq
channels:
  - conda-forge
  - bioconda
dependencies:
  # external download/convert tools (unchanged from iseq)
  - pigz
  - wget
  - axel
  - aspera-cli ==4.14.0
  - sra-tools >=2.11.0
  # light Python additions for Part 1
  - python >=3.8
  - pip
  - openpyxl >=3.0   # optional: parse GSA XLSX in the library API
  - pytest >=7.0     # test suite
  - pip:
      - -e .
