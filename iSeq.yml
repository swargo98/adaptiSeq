# Conda environment for adaptiSeq (Parts 1-2).
#
# Same external tools iseq requires (wget, axel, pigz, aspera-cli, sra-tools)
# plus only the light Python additions Parts 1-2 need. Metadata bytes are pulled
# by `wget` (shelled out, exactly as iseq does), so `requests` is NOT required.
#
# Part 2 adds the async segmented HTTP(S)/FTP engine: aiohttp + aioftp.
# Deliberately NOT added yet: numpy, skopt, scipy (those belong to Part 3).
name: adaptiseq
channels:
  - conda-forge
  - bioconda
dependencies:
  # external download/convert tools (unchanged from iseq)
  - pigz
  - wget
  - axel
  - aspera-cli ==4.14.0
  - sra-tools >=2.11.0
  # light Python additions for Parts 1-2
  - python >=3.8
  - pip
  - aiohttp >=3.8    # Part 2: segmented HTTP(S) engine
  - aioftp >=0.21    # Part 2: native segmented FTP transport
  - numpy >=1.21     # Part 3: gradient adaptive controller
  - openpyxl >=3.0   # optional: parse GSA XLSX in the library API
  - pytest >=7.0     # test suite
  - pip:
      - -e .
